<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Kyungsub Park</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
            background-color: #525659;
        }

        .pdf-container {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        @media screen and (max-width: 768px) {
            .pdf-container {
                overflow: auto;
                -webkit-overflow-scrolling: touch;
            }
        }

        @media screen and (max-width: 480px) {
            html, body {
                overflow: auto;
            }

            .pdf-container {
                height: auto;
                min-height: 100vh;
            }
        }
    </style>
</head>
<body>
    <div class="pdf-container">
        <iframe src="portfolio_fin_30.pdf#toolbar=1&navpanes=0&scrollbar=1&view=FitH"></iframe>
    </div>
</body>
</html>
